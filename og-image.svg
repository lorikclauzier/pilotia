<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#080c14"/>

  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(59,130,246,0.06)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.18)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="500" ry="350" fill="url(#glow)"/>

  <!-- Logo -->
  <text x="600" y="240" font-family="Arial, sans-serif" font-weight="900" font-size="88" fill="white" text-anchor="middle" letter-spacing="-3">pylot<tspan fill="#3b82f6">IA</tspan></text>

  <!-- Tagline -->
  <text x="600" y="310" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="#8899bb" text-anchor="middle">Le CRM intelligent pour TPE/PME</text>

  <!-- Divider -->
  <line x1="480" y1="345" x2="720" y2="345" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>

  <!-- Features -->
  <text x="600" y="395" font-family="Arial, sans-serif" font-weight="400" font-size="20" fill="#4a5a78" text-anchor="middle">Clients · Prospects · Agenda · Assistant IA</text>

  <!-- CTA Badge -->
  <rect x="450" y="430" width="300" height="44" rx="22" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="600" y="458" font-family="Arial, sans-serif" font-weight="600" font-size="16" fill="#93c5fd" text-anchor="middle">Essai gratuit 30 jours · 0€ au démarrage</text>
</svg>
