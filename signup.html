<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pylotIA — Créer un compte gratuit</title>
<meta name="description" content="Créez votre compte pylotIA gratuitement. Aucune carte bancaire requise.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#f6f9ff;
  --dark2:#ffffff;
  --dark3:#f0f5ff;
  --blue:#3b82f6;
  --blue2:#2563eb;
  --text:#0d1628;
  --text2:#4a5a78;
  --text3:#8393b5;
  --border:rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.14);
}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

/* Background grid */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.06) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);pointer-events:none}
body::after{content:'';position:fixed;top:10%;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(59,130,246,0.08) 0%,transparent 70%);pointer-events:none}

.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#0d1628;letter-spacing:-0.5px;margin-bottom:36px;text-decoration:none}
.logo span{color:var(--blue)}

.card{width:100%;max-width:420px;background:var(--dark2);border:1px solid var(--border2);border-radius:16px;padding:36px;position:relative;z-index:1}
.card-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#0d1628;margin-bottom:6px;letter-spacing:-0.5px}
.card-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.5}

.form-group{margin-bottom:18px}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:7px;font-weight:500}
input{width:100%;padding:11px 14px;background:var(--dark3);border:1px solid var(--border2);border-radius:8px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
input::placeholder{color:var(--text3)}
input:focus{border-color:rgba(59,130,246,0.5);box-shadow:0 0 0 3px rgba(59,130,246,0.08)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:42px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;display:flex;align-items:center;justify-content:center;transition:color 0.2s}
.pw-toggle:hover{color:var(--blue)}

.btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.2s;margin-top:8px}
.btn:hover{background:var(--blue2)}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.divider{height:1px;background:var(--border);margin:24px 0}

.footer-link{text-align:center;font-size:13px;color:var(--text2)}
.footer-link a{color:var(--blue);text-decoration:none;font-weight:500}
.footer-link a:hover{text-decoration:underline}

.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:18px;display:none}
.alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5}
.alert-success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:#6ee7b7}

@media(max-width:480px){
  body{padding:16px;justify-content:flex-start;padding-top:40px}
  .logo{margin-bottom:24px;font-size:20px}
  .card{padding:24px 20px;border-radius:14px}
  .card-title{font-size:19px}
  input{min-height:48px;font-size:16px}
  .btn{min-height:48px;font-size:15px}
}
</style>
</head>
<body>

<a href="index.html" class="logo">pylot<span>IA</span></a>

<div class="card">
  <div class="card-title">Créer un compte</div>
  <div class="card-sub">Rejoignez pylotIA et gérez votre CRM intelligemment.</div>

  <div class="alert alert-error" id="error-msg"></div>
  <div class="alert alert-success" id="success-msg"></div>

  <form id="signup-form">
    <div class="form-group">
      <label for="name">Nom complet</label>
      <input type="text" id="name" placeholder="Jean Dupont" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="jean@exemple.fr" required>
    </div>
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="8 caractères minimum" required minlength="8">
        <button type="button" class="pw-toggle" onclick="togglePw()" title="Afficher/masquer">
          <svg id="pw-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn" id="submit-btn">Créer mon compte</button>
  </form>

  <div class="divider"></div>

  <div class="footer-link">Déjà un compte ? <a href="login.html">Se connecter</a></div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ⚠️ Remplace ces valeurs par les tiennes dans le dashboard Supabase (Settings > API)
  const SUPABASE_URL = 'https://wpyhxotefkpvqzpndpgg.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_m_m0c4egKS1E9LsVcJ93IQ_v7TYy-BS';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function togglePw() {
    const input = document.getElementById('password');
    const eye = document.getElementById('pw-eye');
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    eye.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  const form = document.getElementById('signup-form');
  const submitBtn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');
  const successMsg = document.getElementById('success-msg');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    successMsg.style.display = 'none';
  }

  function showSuccess(msg) {
    successMsg.textContent = msg;
    successMsg.style.display = 'block';
    errorMsg.style.display = 'none';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Création en cours...';
    errorMsg.style.display = 'none';

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { error } = await supabaseClient.auth.signUp({
      email,
      password,
      options: { data: { full_name: name } }
    });

    if (error) {
      showError(error.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Créer mon compte';
    } else {
      // Si confirmation email désactivée → session immédiate → redirection dashboard
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        window.location.href = 'dashboard.html';
      } else {
        showSuccess('Compte créé ! Vérifiez votre email pour confirmer votre inscription.');
        form.reset();
        submitBtn.disabled = false;
        submitBtn.textContent = 'Créer mon compte';
      }
    }
  });
</script>
</body>
</html>
