<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pylotIA — Connexion</title>
<meta name="description" content="Connectez-vous à votre espace pylotIA et gérez vos clients, RDV et prospects.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#080c14;
  --dark2:#0e1420;
  --dark3:#141c2e;
  --blue:#3b82f6;
  --blue2:#2563eb;
  --text:#f0f4ff;
  --text2:#8899bb;
  --text3:#4a5a78;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);pointer-events:none}
body::after{content:'';position:fixed;top:10%;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(59,130,246,0.1) 0%,transparent 70%);pointer-events:none}

.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:36px;text-decoration:none}
.logo span{color:var(--blue)}

.card{width:100%;max-width:420px;background:var(--dark2);border:1px solid var(--border2);border-radius:16px;padding:36px;position:relative;z-index:1}
.card-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:-0.5px}
.card-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.5}

.form-group{margin-bottom:18px}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:7px;font-weight:500}
input{width:100%;padding:11px 14px;background:var(--dark3);border:1px solid var(--border2);border-radius:8px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
input::placeholder{color:var(--text3)}
input:focus{border-color:rgba(59,130,246,0.5);box-shadow:0 0 0 3px rgba(59,130,246,0.08)}

.btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.2s;margin-top:8px}
.btn:hover{background:var(--blue2)}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.divider{height:1px;background:var(--border);margin:24px 0}

.footer-link{text-align:center;font-size:13px;color:var(--text2)}
.footer-link a{color:var(--blue);text-decoration:none;font-weight:500}
.footer-link a:hover{text-decoration:underline}

.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:18px;display:none}
.alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5}
</style>
</head>
<body>

<a href="index.html" class="logo">pylot<span>IA</span></a>

<div class="card">
  <div class="card-title">Connexion</div>
  <div class="card-sub">Accédez à votre espace pylotIA.</div>

  <div class="alert alert-error" id="error-msg"></div>

  <form id="login-form">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="jean@exemple.fr" required>
    </div>
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn" id="submit-btn">Se connecter</button>
  </form>

  <div style="text-align:right;margin-top:10px">
    <a href="forgot-password.html" style="font-size:13px;color:var(--text3);text-decoration:none;transition:color 0.2s" onmouseover="this.style.color='var(--blue)'" onmouseout="this.style.color='var(--text3)'">Mot de passe oublié ?</a>
  </div>

  <div class="divider"></div>

  <div class="footer-link">Pas encore de compte ? <a href="signup.html">S'inscrire</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ⚠️ Remplace ces valeurs par les tiennes (Settings > API dans Supabase)
  const SUPABASE_URL = 'https://wpyhxotefkpvqzpndpgg.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_m_m0c4egKS1E9LsVcJ93IQ_v7TYy-BS';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Redirige si déjà connecté
  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html';
  });

  const form = document.getElementById('login-form');
  const submitBtn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Connexion...';
    errorMsg.style.display = 'none';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      errorMsg.textContent = 'Email ou mot de passe incorrect.';
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Se connecter';
    } else {
      window.location.href = 'dashboard.html';
    }
  });
</script>
</body>
</html>
