<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pylotIA — Page introuvable</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--dark:#080c14;--blue:#3b82f6;--text:#f0f4ff;--text2:#8899bb;--text3:#4a5a78}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);pointer-events:none}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;text-decoration:none;letter-spacing:-0.5px;margin-bottom:60px;display:block}
.logo span{color:var(--blue)}
.code{font-family:'Syne',sans-serif;font-size:120px;font-weight:800;color:transparent;-webkit-text-stroke:2px rgba(59,130,246,0.3);line-height:1;margin-bottom:24px}
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin-bottom:12px}
p{font-size:16px;color:var(--text2);max-width:400px;line-height:1.6;margin-bottom:36px}
.btn{display:inline-block;padding:12px 28px;background:var(--blue);color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;transition:opacity 0.2s}
.btn:hover{opacity:0.85}
.btn-ghost{display:inline-block;padding:12px 28px;color:var(--text2);border-radius:8px;text-decoration:none;font-size:14px;margin-left:12px;transition:color 0.2s}
.btn-ghost:hover{color:var(--text)}
</style>
</head>
<body>
<a href="index.html" class="logo">pylot<span>IA</span></a>
<div class="code">404</div>
<h1>Page introuvable</h1>
<p>Cette page n'existe pas ou a été déplacée. Pas de panique — votre CRM est toujours là.</p>
<div>
  <a href="index.html" class="btn">Retour à l'accueil</a>
  <a href="dashboard.html" class="btn-ghost">Mon dashboard →</a>
</div>
</body>
</html>
