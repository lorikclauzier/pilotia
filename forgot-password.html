<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pylotIA — Mot de passe oublié</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#f6f9ff;
  --dark2:#ffffff;
  --dark3:#f0f5ff;
  --blue:#3b82f6;
  --blue2:#2563eb;
  --text:#0d1628;
  --text2:#4a5a78;
  --text3:#8393b5;
  --border:rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.14);
}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.06) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);pointer-events:none}
body::after{content:'';position:fixed;top:10%;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(59,130,246,0.08) 0%,transparent 70%);pointer-events:none}

.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#0d1628;letter-spacing:-0.5px;margin-bottom:36px;text-decoration:none}
.logo span{color:var(--blue)}

.card{width:100%;max-width:420px;background:var(--dark2);border:1px solid var(--border2);border-radius:16px;padding:36px;position:relative;z-index:1}
.card-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#0d1628;margin-bottom:6px;letter-spacing:-0.5px}
.card-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.5}

.form-group{margin-bottom:18px}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:7px;font-weight:500}
input{width:100%;padding:11px 14px;background:var(--dark3);border:1px solid var(--border2);border-radius:8px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
input::placeholder{color:var(--text3)}
input:focus{border-color:rgba(59,130,246,0.5);box-shadow:0 0 0 3px rgba(59,130,246,0.08)}

.btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.2s;margin-top:8px}
.btn:hover{background:var(--blue2)}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.divider{height:1px;background:var(--border);margin:24px 0}

.footer-link{text-align:center;font-size:13px;color:var(--text2)}
.footer-link a{color:var(--blue);text-decoration:none;font-weight:500}
.footer-link a:hover{text-decoration:underline}

.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:18px;display:none}
.alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5}
.alert-success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:#6ee7b7}

.icon-wrap{width:52px;height:52px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.icon-wrap svg{width:24px;height:24px;stroke:#3b82f6;fill:none;stroke-width:1.5}
</style>
</head>
<body>

<a href="index.html" class="logo">pylot<span>IA</span></a>

<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
  </div>
  <div class="card-title">Mot de passe oublié ?</div>
  <div class="card-sub">Entrez votre email et nous vous enverrons un lien pour réinitialiser votre mot de passe.</div>

  <div class="alert alert-error" id="error-msg"></div>
  <div class="alert alert-success" id="success-msg"></div>

  <form id="reset-form">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="jean@exemple.fr" required>
    </div>
    <button type="submit" class="btn" id="submit-btn">Envoyer le lien de réinitialisation</button>
  </form>

  <div class="divider"></div>

  <div class="footer-link"><a href="login.html">← Retour à la connexion</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://wpyhxotefkpvqzpndpgg.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_m_m0c4egKS1E9LsVcJ93IQ_v7TYy-BS';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('reset-form');
  const submitBtn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');
  const successMsg = document.getElementById('success-msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Envoi en cours...';
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    const email = document.getElementById('email').value.trim();

    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html'
    });

    if (error) {
      errorMsg.textContent = 'Une erreur est survenue. Vérifiez votre email et réessayez.';
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Envoyer le lien de réinitialisation';
    } else {
      successMsg.textContent = '✓ Email envoyé ! Vérifiez votre boîte mail (et vos spams).';
      successMsg.style.display = 'block';
      form.reset();
      submitBtn.disabled = false;
      submitBtn.textContent = 'Envoyer le lien de réinitialisation';
    }
  });
</script>
</body>
</html>
